<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pause, look up and observe the colors around you.</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Inter:wght@300;400;500&display=swap');

*{box-sizing:border-box;margin:0;padding:0;}

:root{
  --bg:#faf8f5;
  --text:#1c1a17;
  --text2:#7a7570;
  --text3:#b0aba4;
  --border:rgba(0,0,0,0.08);
  --border2:rgba(0,0,0,0.13);
  --surface:#fff;
}

html{scroll-behavior:smooth;}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Inter',system-ui,sans-serif;
  font-size:14px;
  line-height:1.5;
}

/* ── NAV ── */
nav{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:1.25rem 2.5rem;
  border-bottom:1px solid var(--border);
  position:sticky;
  top:0;
  background:var(--bg);
  z-index:100;
}

.nav-logo{
  font-family:'EB Garamond',serif;
  font-size:17px;
  font-style:italic;
  color:var(--text);
  text-decoration:none;
  letter-spacing:0.01em;
}

.nav-links{
  display:flex;
  gap:2rem;
  list-style:none;
}

.nav-links a{
  font-size:13px;
  color:var(--text2);
  text-decoration:none;
  transition:color 0.15s;
}
.nav-links a:hover{color:var(--text);}

/* ── HERO ── */
.hero{
  text-align:center;
  padding:4rem 2rem 3rem;
  border-bottom:1px solid var(--border);
}

.hero-tagline{
  font-size:11px;
  font-weight:500;
  letter-spacing:0.14em;
  text-transform:uppercase;
  color:var(--text3);
  margin-bottom:1rem;
}

.hero-title{
  font-family:'EB Garamond',serif;
  font-size:clamp(28px,4vw,44px);
  font-weight:400;
  line-height:1.2;
  color:var(--text);
  max-width:560px;
  margin:0 auto 1rem;
  letter-spacing:-0.01em;
}

.hero-title em{font-style:italic;}

.hero-desc{
  font-size:14px;
  color:var(--text2);
  max-width:380px;
  margin:0 auto;
  line-height:1.7;
}

/* ── ARCHIVE ── */
.archive{padding:0 2.5rem 6rem;}

/* Month section */
.month-section{border-bottom:1px solid var(--border);padding:3.5rem 0 3rem;}
.month-section:last-child{border-bottom:none;}

.month-header{
  display:flex;
  align-items:baseline;
  justify-content:space-between;
  margin-bottom:2rem;
  gap:1rem;
  flex-wrap:wrap;
}

.month-name{
  font-family:'EB Garamond',serif;
  font-size:clamp(22px,3vw,30px);
  font-weight:400;
  color:var(--text);
  letter-spacing:-0.01em;
}

.month-meta{
  display:flex;
  align-items:center;
  gap:1.25rem;
  flex-wrap:wrap;
}

.cotm-pill{
  display:flex;
  align-items:center;
  gap:8px;
  background:var(--surface);
  border:1px solid var(--border2);
  border-radius:100px;
  padding:6px 12px 6px 8px;
  font-size:12px;
  color:var(--text2);
}

.cotm-dot{
  width:18px;height:18px;border-radius:50%;
  border:0.5px solid rgba(0,0,0,0.1);
  flex-shrink:0;
}

.cotm-label{color:var(--text3);font-size:11px;margin-right:1px;}

.month-locations{
  font-size:12px;
  color:var(--text3);
}

/* Sky grid */
.sky-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:12px;
}

/* Sky card */
.sky-card{
  border-radius:16px;
  overflow:hidden;
  position:relative;
  aspect-ratio:3/4;
  cursor:pointer;
  group:true;
}

.sky-card:hover .card-overlay{opacity:1;}
.sky-card:hover .sky-gradient{transform:scale(1.02);}

.sky-gradient{
  width:100%;
  height:100%;
  display:block;
  transition:transform 0.35s ease;
}

/* Card overlay */
.card-overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to top, rgba(0,0,0,0.45) 0%, rgba(0,0,0,0.1) 50%, transparent 100%);
  opacity:0;
  transition:opacity 0.25s ease;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  padding:14px;
  gap:8px;
}

.card-location{
  font-size:11px;
  font-weight:500;
  letter-spacing:0.06em;
  text-transform:uppercase;
  color:rgba(255,255,255,0.8);
}

.card-actions{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
}

.card-btn{
  font-size:11px;
  font-weight:500;
  color:#fff;
  background:rgba(0,0,0,0.35);
  border:1px solid rgba(255,255,255,0.25);
  border-radius:100px;
  padding:5px 11px;
  cursor:pointer;
  backdrop-filter:blur(8px);
  transition:background 0.15s;
  white-space:nowrap;
  display:flex;
  align-items:center;
  gap:5px;
}

.card-btn:hover{background:rgba(0,0,0,0.55);}
.card-btn svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2;}

/* Color chips on card (visible always, bottom bar) */
.card-colors{
  position:absolute;
  bottom:0;left:0;right:0;
  height:5px;
  display:flex;
}

.card-color-seg{flex:1;}

/* ── LIGHTBOX ── */
.lightbox{
  position:fixed;inset:0;
  background:rgba(28,26,23,0.7);
  backdrop-filter:blur(12px);
  z-index:200;
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  pointer-events:none;
  transition:opacity 0.2s;
  padding:1.5rem;
}

.lightbox.open{opacity:1;pointer-events:all;}

.lb-card{
  background:var(--surface);
  border-radius:24px;
  overflow:hidden;
  width:min(480px,100%);
  max-height:90vh;
  overflow-y:auto;
  transform:translateY(16px);
  transition:transform 0.25s ease;
  box-shadow:0 24px 64px rgba(0,0,0,0.2);
}

.lightbox.open .lb-card{transform:translateY(0);}

.lb-gradient{
  width:100%;
  height:240px;
  display:block;
  flex-shrink:0;
}

.lb-body{padding:1.5rem;}

.lb-location{
  font-size:11px;
  font-weight:500;
  letter-spacing:0.1em;
  text-transform:uppercase;
  color:var(--text3);
  margin-bottom:0.35rem;
}

.lb-title{
  font-family:'EB Garamond',serif;
  font-size:24px;
  font-weight:400;
  color:var(--text);
  margin-bottom:1.25rem;
  letter-spacing:-0.01em;
}

.lb-swatches{
  display:flex;
  gap:8px;
  margin-bottom:1.25rem;
  flex-wrap:wrap;
}

.lb-swatch{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:5px;
  cursor:pointer;
}

.lb-swatch-circle{
  width:40px;height:40px;border-radius:50%;
  border:1px solid rgba(0,0,0,0.08);
  transition:transform 0.15s;
}
.lb-swatch:hover .lb-swatch-circle{transform:scale(1.1);}

.lb-hex{
  font-size:10px;
  font-family:'Courier New',monospace;
  color:var(--text3);
}

.lb-actions{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.lb-btn{
  font-size:12px;
  font-weight:500;
  color:var(--text);
  background:var(--bg);
  border:1px solid var(--border2);
  border-radius:100px;
  padding:8px 16px;
  cursor:pointer;
  display:flex;align-items:center;gap:6px;
  transition:background 0.15s,border-color 0.15s;
  text-decoration:none;
}
.lb-btn:hover{background:#eee;border-color:rgba(0,0,0,0.2);}
.lb-btn.primary{background:var(--text);color:#fff;border-color:var(--text);}
.lb-btn.primary:hover{background:#333;}
.lb-btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;}

.lb-close{
  position:absolute;top:1.25rem;right:1.25rem;
  background:rgba(0,0,0,0.12);
  border:none;border-radius:50%;
  width:32px;height:32px;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--text);
  font-size:18px;
  line-height:1;
  transition:background 0.15s;
}
.lb-close:hover{background:rgba(0,0,0,0.2);}

/* ── FOOTER ── */
footer{
  border-top:1px solid var(--border);
  padding:2rem 2.5rem;
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:1rem;
}

.footer-logo{
  font-family:'EB Garamond',serif;
  font-style:italic;
  font-size:16px;
  color:var(--text2);
}

.footer-note{
  font-size:12px;
  color:var(--text3);
}

/* Toast */
.toast{
  position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);
  background:var(--text);color:#fff;
  font-size:12px;font-weight:500;
  padding:9px 18px;border-radius:100px;
  pointer-events:none;
  opacity:0;transition:opacity 0.2s;
  z-index:999;
  white-space:nowrap;
}
.toast.show{opacity:1;}

canvas{display:none;}

@media(max-width:640px){
  nav{padding:1rem 1.25rem;}
  .archive{padding:0 1.25rem 4rem;}
  .month-section{padding:2.5rem 0 2rem;}
  footer{padding:1.5rem 1.25rem;}
}
</style>
</head>
<body>

<nav>
  <a href="#" class="nav-logo">Gradient Skies</a>
  <ul class="nav-links">
    <li><a href="#archive">Archive</a></li>
    <li><a href="#about">About</a></li>
  </ul>
</nav>

<section class="hero">
  <p class="hero-tagline">A growing archive</p>
  <h1 class="hero-title">Pause, look up and observe the <em>colors</em> around you.</h1>
  <p class="hero-desc">A growing archive of sunset gradients for anyone who enjoys color in nature.</p>
</section>

<main class="archive" id="archive"></main>

<footer>
  <span class="footer-logo">Gradient Skies</span>
  <span class="footer-note">A growing archive of sunset gradients · made with love</span>
</footer>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLB(event)">
  <div class="lb-card" id="lb-card">
    <canvas class="lb-gradient" id="lb-canvas" width="480" height="240"></canvas>
    <div class="lb-body">
      <p class="lb-location" id="lb-location"></p>
      <h2 class="lb-title" id="lb-title"></h2>
      <div class="lb-swatches" id="lb-swatches"></div>
      <div class="lb-actions">
        <button class="lb-btn primary" onclick="downloadLB()">
          <svg viewBox="0 0 24 24"><path d="M12 3v13M8 12l4 4 4-4"/><path d="M3 17v2a2 2 0 002 2h14a2 2 0 002-2v-2"/></svg>
          Download PNG
        </button>
        <button class="lb-btn" id="css-copy-btn" onclick="copyLBCSS()">
          <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          Copy CSS code
        </button>
      </div>
    </div>
    <button class="lb-close" onclick="closeLB(null)">×</button>
  </div>
</div>

<div class="toast" id="toast"></div>
<canvas id="dl-canvas" style="display:none"></canvas>

<script>
// ── DATA ──
const archive = [
  {
    month: "June 2025",
    cotm: { name: "Azure Sky", hex: "#d0edff" },
    locations: "Bangalore, Maldives",
    skies: [
      { location: "Bangalore", name: "Powder Dusk", colors: ["#c8e8ff","#a8cfe8","#7baac8","#5a84a8","#3a5f88"] },
      { location: "Maldives",  name: "Lagoon Fade", colors: ["#e0f4ff","#90d4f0","#50a8d8","#2878b0","#0a4888"] },
      { location: "Bangalore", name: "Pale Horizon",colors: ["#ddeeff","#b8d8f0","#88b8d8","#5890b8","#386898"] },
      { location: "Maldives",  name: "Reef Blue",   colors: ["#a0dff0","#60c0e0","#2098c8","#0070a8","#004880"] },
      { location: "Bangalore", name: "Silver Cloud",colors: ["#e8f4ff","#c8e0f4","#98c4e4","#68a0c8","#3878a8"] },
    ]
  },
  {
    month: "May 2025",
    cotm: { name: "Gentle Mist", hex: "#bdc0c3" },
    locations: "Bangalore, Maldives, Pune",
    skies: [
      { location: "Maldives",  name: "Overcast Pearl", colors: ["#d8dce0","#b8bcc4","#9098a8","#687088","#485068"] },
      { location: "Bangalore", name: "Monsoon Veil",   colors: ["#c8ccd4","#a0a8b4","#788090","#505870","#303858"] },
      { location: "Maldives",  name: "Steel Dawn",     colors: ["#c0c8d0","#9098a8","#607080","#385060","#183040"] },
      { location: "Bangalore", name: "Fog Linen",      colors: ["#dce0e4","#bcc0c8","#9098a4","#687080","#484858"] },
      { location: "Pune",      name: "Smoke Dusk",     colors: ["#d0d4d8","#a8adb4","#808590","#585d68","#383d48"] },
    ]
  },
  {
    month: "April 2025",
    cotm: { name: "Sunset Blaze", hex: "#ffe5d5" },
    locations: "Bangalore, Pune",
    skies: [
      { location: "Pune",      name: "Tangerine Dusk", colors: ["#ffe0a0","#f8b870","#f08048","#c85830","#902018"] },
      { location: "Bangalore", name: "Ember Hour",     colors: ["#ffd890","#f8a860","#f07038","#c84820","#901008"] },
      { location: "Bangalore", name: "Rose Horizon",   colors: ["#ffc8c0","#f89080","#e06050","#b83830","#882018"] },
      { location: "Bangalore", name: "Apricot Sky",    colors: ["#ffe8c0","#f8c080","#f09048","#c86828","#904010"] },
      { location: "Bangalore", name: "Crimson Fade",   colors: ["#ffd0b0","#f8a070","#e07040","#b84820","#882010"] },
    ]
  },
  {
    month: "March 2025",
    cotm: { name: "Azure Sky", hex: "#7ea8da" },
    locations: "Bangalore, Pune",
    skies: [
      { location: "Bangalore", name: "Morning Cerulean", colors: ["#b8d8f8","#7ea8da","#4878b8","#285090","#103068"] },
      { location: "Bangalore", name: "Cobalt Dusk",      colors: ["#c0d8f0","#88b0d8","#5080b8","#2858a0","#103078"] },
      { location: "Bangalore", name: "Periwinkle Hour",  colors: ["#c8d0f8","#9098e0","#6068c0","#3840a0","#182080"] },
      { location: "Bangalore", name: "Navy Blush",       colors: ["#d0d8f8","#a0a8e8","#7078c8","#4050a8","#203080"] },
      { location: "Bangalore", name: "Pale Indigo",      colors: ["#d8d8f8","#a8a8e8","#7878c8","#5050a8","#282880"] },
      { location: "Pune",      name: "Twilight Blue",    colors: ["#c0c8f0","#8890d8","#5060b8","#2838a0","#102080"] },
      { location: "Pune",      name: "Denim Sky",        colors: ["#b0c8e8","#7098c8","#3870a8","#185090","#083068"] },
    ]
  },
  {
    month: "February 2025",
    cotm: { name: "Golden Hour", hex: "#ffe05e" },
    locations: "Bangalore, Mumbai",
    skies: [
      { location: "Bangalore", name: "Saffron Crown",  colors: ["#fff0a0","#f8d060","#f0a820","#c87800","#905000"] },
      { location: "Mumbai",    name: "Brass Horizon",  colors: ["#ffe8a0","#f8c860","#f09820","#c87000","#904800"] },
      { location: "Mumbai",    name: "Marigold Dusk",  colors: ["#fff0a8","#f8d068","#f0a828","#d08000","#a05800"] },
      { location: "Mumbai",    name: "Amber Fade",     colors: ["#ffe8a8","#f8c868","#e89830","#c07010","#904800"] },
      { location: "Bangalore", name: "Wheat Glow",     colors: ["#fff8b8","#f8e080","#f0c040","#c89010","#906000"] },
    ]
  },
  {
    month: "January 2025",
    cotm: { name: "Sunset Blaze", hex: "#fc9c92" },
    locations: "Bangalore, Goa",
    skies: [
      { location: "Bangalore", name: "Coral Dusk",    colors: ["#ffd0c8","#f8a098","#f07068","#c84848","#902030"] },
      { location: "Bangalore", name: "Flamingo Sky",  colors: ["#ffccc8","#f89898","#f06868","#c84040","#902028"] },
      { location: "Bangalore", name: "Watermelon",    colors: ["#ffd0c0","#f8a088","#f07060","#c84840","#902028"] },
      { location: "Goa",       name: "Hibiscus Hour", colors: ["#ffc8c0","#f89090","#f06070","#c83850","#882038"] },
    ]
  },
];

// ── RENDER ──
const archiveEl = document.getElementById('archive');

archive.forEach(month => {
  const sec = document.createElement('section');
  sec.className = 'month-section';

  const hdr = document.createElement('div');
  hdr.className = 'month-header';
  hdr.innerHTML = `
    <h2 class="month-name">${month.month}</h2>
    <div class="month-meta">
      <div class="cotm-pill">
        <div class="cotm-dot" style="background:${month.cotm.hex}"></div>
        <span class="cotm-label">Color of the month</span>
        <span>${month.cotm.name} · <span style="font-family:monospace;font-size:11px">${month.cotm.hex}</span></span>
      </div>
      <span class="month-locations">${month.locations}</span>
    </div>
  `;
  sec.appendChild(hdr);

  const grid = document.createElement('div');
  grid.className = 'sky-grid';

  month.skies.forEach((sky, i) => {
    const card = document.createElement('div');
    card.className = 'sky-card';

    // Draw gradient to canvas, transfer to img
    const cvs = document.createElement('canvas');
    cvs.width = 320; cvs.height = 426;
    const ctx = cvs.getContext('2d');
    const grad = ctx.createLinearGradient(0, 0, 0, 426);
    sky.colors.forEach((c, ci) => grad.addColorStop(ci / (sky.colors.length - 1), c));
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, 320, 426);

    const img = document.createElement('img');
    img.className = 'sky-gradient';
    img.src = cvs.toDataURL();
    img.alt = sky.name;

    const overlay = document.createElement('div');
    overlay.className = 'card-overlay';
    overlay.innerHTML = `
      <span class="card-location">${sky.location}</span>
      <div class="card-actions">
        <button class="card-btn" onclick="event.stopPropagation();downloadCard(${JSON.stringify(sky.colors)}, '${sky.name}')">
          <svg viewBox="0 0 24 24"><path d="M12 3v13M8 12l4 4 4-4"/><path d="M3 17v2a2 2 0 002 2h14a2 2 0 002-2v-2"/></svg>
          Download PNG
        </button>
        <button class="card-btn" onclick="event.stopPropagation();copyCSSCard(${JSON.stringify(sky.colors)}, this)">
          <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          Copy CSS code
        </button>
      </div>
    `;

    const colorBar = document.createElement('div');
    colorBar.className = 'card-colors';
    sky.colors.forEach(c => {
      const seg = document.createElement('div');
      seg.className = 'card-color-seg';
      seg.style.background = c;
      colorBar.appendChild(seg);
    });

    card.appendChild(img);
    card.appendChild(overlay);
    card.appendChild(colorBar);
    card.onclick = () => openLB(sky);
    grid.appendChild(card);
  });

  sec.appendChild(grid);
  archiveEl.appendChild(sec);
});

// ── LIGHTBOX ──
let currentSky = null;

function openLB(sky) {
  currentSky = sky;
  document.getElementById('lb-location').textContent = sky.location.toUpperCase();
  document.getElementById('lb-title').textContent = sky.name;

  // Draw gradient
  const cvs = document.getElementById('lb-canvas');
  const ctx = cvs.getContext('2d');
  const grad = ctx.createLinearGradient(0, 0, 480, 240);
  sky.colors.forEach((c, i) => grad.addColorStop(i / (sky.colors.length - 1), c));
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 480, 240);

  // Swatches
  const sw = document.getElementById('lb-swatches');
  sw.innerHTML = sky.colors.map(c => `
    <div class="lb-swatch" onclick="copyHex('${c}')">
      <div class="lb-swatch-circle" style="background:${c}"></div>
      <span class="lb-hex">${c}</span>
    </div>
  `).join('');

  document.getElementById('lightbox').classList.add('open');
}

function closeLB(e) {
  if (!e || e.target === document.getElementById('lightbox'))
    document.getElementById('lightbox').classList.remove('open');
}

function downloadLB() {
  if (!currentSky) return;
  const cvs = document.createElement('canvas');
  cvs.width = 1200; cvs.height = 1600;
  const ctx = cvs.getContext('2d');
  const grad = ctx.createLinearGradient(0, 0, 0, 1600);
  currentSky.colors.forEach((c, i) => grad.addColorStop(i / (currentSky.colors.length - 1), c));
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 1200, 1600);
  const a = document.createElement('a');
  a.download = currentSky.name.replace(/\s+/g,'-').toLowerCase() + '.png';
  a.href = cvs.toDataURL('image/png');
  a.click();
}

function copyLBCSS() {
  if (!currentSky) return;
  const stops = currentSky.colors.map((c,i) => `${c} ${Math.round(i/(currentSky.colors.length-1)*100)}%`).join(', ');
  navigator.clipboard.writeText(`background: linear-gradient(to bottom, ${stops});`).catch(()=>{});
  const btn = document.getElementById('css-copy-btn');
  const orig = btn.innerHTML;
  btn.innerHTML = `<svg viewBox="0 0 24 24" style="width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2"><polyline points="20 6 9 17 4 12"/></svg> Copied!`;
  setTimeout(() => btn.innerHTML = orig, 1800);
  showToast('CSS copied to clipboard');
}

function downloadCard(colors, name) {
  const cvs = document.createElement('canvas');
  cvs.width = 1200; cvs.height = 1600;
  const ctx = cvs.getContext('2d');
  const grad = ctx.createLinearGradient(0, 0, 0, 1600);
  colors.forEach((c, i) => grad.addColorStop(i / (colors.length - 1), c));
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 1200, 1600);
  const a = document.createElement('a');
  a.download = name.replace(/\s+/g,'-').toLowerCase() + '.png';
  a.href = cvs.toDataURL('image/png');
  a.click();
}

function copyCSSCard(colors, btn) {
  const stops = colors.map((c,i) => `${c} ${Math.round(i/(colors.length-1)*100)}%`).join(', ');
  navigator.clipboard.writeText(`background: linear-gradient(to bottom, ${stops});`).catch(()=>{});
  const orig = btn.innerHTML;
  btn.innerHTML = `<svg viewBox="0 0 24 24" style="width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2"><polyline points="20 6 9 17 4 12"/></svg> Copied!`;
  setTimeout(() => btn.innerHTML = orig, 1800);
  showToast('CSS copied to clipboard');
}

function copyHex(hex) {
  navigator.clipboard.writeText(hex).catch(()=>{});
  showToast(`${hex} copied`);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}
</script>
</body>
